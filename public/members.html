<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BizHub — Hội viên</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="css/main.css">
</head>
<body class="public-body">
<nav>
  <div class="nav-logo">
    <div class="nav-logo-icon"><i class="ti ti-building-community" aria-hidden="true"></i></div>
    BizHub
  </div>
  <div class="nav-links">
    <a href="index.html#members" class="nav-link">Hội viên</a>
    <a href="index.html#posts" class="nav-link">Bài viết</a>
    <a href="index.html#events" class="nav-link">Sự kiện</a>
    <a href="index.html#tiers" class="nav-link">Gói hội viên</a>
    <a href="ai-chat.html" class="nav-link">Trợ lý AI</a>
  </div>
  <div class="nav-right">
    <a href="login.html" class="btn-ghost">Đăng nhập</a>
    <a href="register.html" class="btn-primary"><i class="ti ti-user-plus" aria-hidden="true"></i> Đăng ký hội viên</a>
  </div>
</nav>

<div class="public-container">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem">
    <h1 style="font-size:24px;font-weight:500;color:var(--text-primary);display:flex;align-items:center;gap:8px"><i class="ti ti-users" style="color:var(--blue)"></i> Danh sách hội viên</h1>
    <div style="display:flex;gap:8px;align-items:center">
      <input type="text" id="main-search" placeholder="Tìm kiếm hội viên..." oninput="filterMembers(this.value)" style="padding:7px 12px;border-radius:8px;border:0.5px solid var(--border-strong);font-size:12px;width:240px;outline:none">
      <a href="register.html" class="btn btn-primary"><i class="ti ti-plus" aria-hidden="true"></i> Đăng ký ngay</a>
    </div>
  </div>

  <div class="card">
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>Doanh nghiệp</th>
            <th>Ngành nghề</th>
            <th>Gói hội viên</th>
            <th>Ngày tham gia</th>
          </tr>
        </thead>
        <tbody id="members-tbody">
          <tr><td colspan="4" style="text-align:center;padding:2rem"><i class="ti ti-loader animate-spin" style="font-size:18px"></i> Đang tải dữ liệu...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="js/i18n.js"></script>
<script src="js/app.js"></script>
<script>
let members = [];
let searchQ = '';

const getInitialsColors = (name) => {
  const sum = name.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
  const colors = [
    { bg: '#E6F1FB', fg: '#0C447C' },
    { bg: '#EAF3DE', fg: '#27500A' },
    { bg: '#FAEEDA', fg: '#633806' },
    { bg: '#EEEDFE', fg: '#3C3489' },
    { bg: '#E1F5EE', fg: '#085041' },
    { bg: '#FAECE7', fg: '#712B13' }
  ];
  return colors[sum % colors.length];
};

async function loadMembers() {
  try {
    const res = await fetch('/api/members?status=approved');
    if (!res.ok) throw new Error('Không thể tải danh sách hội viên');
    const data = await res.json();
    
    members = data.data.map(m => {
      const colors = getInitialsColors(m.name);
      return {
        id: m.id,
        name: m.name,
        initials: m.name.split(' ').filter(Boolean).map(n => n[0]).join('').slice(0, 2).toUpperCase(),
        bg: colors.bg,
        fg: colors.fg,
        tier: m.tier,
        industry: m.industry || 'Chưa phân loại',
        email: m.email || 'Chưa cập nhật',
        date: new Date(m.created_at).toLocaleDateString('vi-VN')
      };
    });
    renderMembers();
  } catch (err) {
    console.error(err);
    document.getElementById('members-tbody').innerHTML = `<tr><td colspan="4"><div class="empty" style="text-align:center;padding:2rem;color:var(--text-muted)"><i class="ti ti-alert-triangle" style="font-size:20px;display:block;margin-bottom:8px"></i> Lỗi tải dữ liệu hội viên.</div></td></tr>`;
  }
}

function renderMembers() {
  const list = members.filter(m => {
    if (searchQ && !m.name.toLowerCase().includes(searchQ) && !m.industry.toLowerCase().includes(searchQ) && !m.email.toLowerCase().includes(searchQ)) return false;
    return true;
  });

  const tbody = document.getElementById('members-tbody');
  tbody.innerHTML = list.map(m => `
    <tr>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="av-circle" style="background:${m.bg};color:${m.fg};font-weight:500">${m.initials}</div>
          <div>
            <div style="font-weight:500;font-size:13px;color:var(--text-primary)">${m.name}</div>
            <div style="font-size:11px;color:var(--text-muted)">${m.email}</div>
          </div>
        </div>
      </td>
      <td style="color:var(--text-secondary);font-size:13px">${m.industry}</td>
      <td>${window.tierBadge(m.tier)}</td>
      <td style="color:var(--text-muted);font-size:12px">${m.date}</td>
    </tr>
  `).join('') || `<tr><td colspan="4"><div class="empty" style="text-align:center;padding:2rem;color:var(--text-muted)"><i class="ti ti-search" style="font-size:20px;display:block;margin-bottom:8px"></i> Không tìm thấy hội viên phù hợp.</div></td></tr>`;
}

function filterMembers(q) {
  searchQ = q.toLowerCase();
  renderMembers();
}

document.addEventListener('DOMContentLoaded', loadMembers);
</script>
</body>
</html>
