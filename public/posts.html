<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BizHub — Bài viết</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="css/main.css">
</head>
<body class="public-body">
<nav>
  <div class="nav-logo">
    <div class="nav-logo-icon"><i class="ti ti-building-community" aria-hidden="true"></i></div>
    BizHub
  </div>
  <div class="nav-links">
    <a href="index.html#members" class="nav-link">Hội viên</a>
    <a href="index.html#posts" class="nav-link">Bài viết</a>
    <a href="index.html#events" class="nav-link">Sự kiện</a>
    <a href="index.html#tiers" class="nav-link">Gói hội viên</a>
    <a href="ai-chat.html" class="nav-link">Trợ lý AI</a>
  </div>
  <div class="nav-right">
    <a href="login.html" class="btn-ghost">Đăng nhập</a>
    <a href="register.html" class="btn-primary"><i class="ti ti-user-plus" aria-hidden="true"></i> Đăng ký hội viên</a>
  </div>
</nav>

<div class="public-container">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem">
    <h1 style="font-size:24px;font-weight:500;color:var(--text-primary);display:flex;align-items:center;gap:8px"><i class="ti ti-news" style="color:var(--blue)"></i> Bảng tin & Cơ hội</h1>
    <div style="display:flex;gap:8px">
      <input type="text" id="main-search" placeholder="Tìm kiếm bài viết..." oninput="filterPosts(this.value)" style="padding:7px 12px;border-radius:8px;border:0.5px solid var(--border-strong);font-size:12px;width:240px;outline:none">
    </div>
  </div>

  <div id="posts-list">
    <div style="text-align:center;padding:3rem;color:var(--text-muted)"><i class="ti ti-loader animate-spin" style="font-size:20px;display:block;margin-bottom:8px"></i> Đang tải bài viết...</div>
  </div>
</div>

<!-- Modal xem bài -->
<div id="post-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:200;align-items:flex-start;justify-content:center;padding:2rem 1rem">
  <div style="background:var(--surface-2);border-radius:14px;border:0.5px solid var(--border);width:100%;max-width:560px;max-height:80vh;overflow-y:auto">
    <div style="padding:.9rem 1.2rem;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface-2)">
      <div style="font-size:14px;font-weight:500" id="modal-title">Chi tiết bài viết</div>
      <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--text-muted)"><i class="ti ti-x"></i></button>
    </div>
    <div style="padding:1.2rem" id="modal-body"></div>
    <div style="padding:.85rem 1.2rem;border-top:0.5px solid var(--border);display:flex;gap:8px;justify-content:flex-end" id="modal-footer">
      <button class="btn btn-primary" onclick="closeModal()">Đóng</button>
    </div>
  </div>
</div>

<script src="js/i18n.js"></script>
<script src="js/app.js"></script>
<script>
let posts = [];
let searchQ = '';

const getInitialsColors = (name) => {
  const sum = name.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
  const colors = [
    { bg: '#E6F1FB', fg: '#0C447C' },
    { bg: '#EAF3DE', fg: '#27500A' },
    { bg: '#FAEEDA', fg: '#633806' },
    { bg: '#EEEDFE', fg: '#3C3489' },
    { bg: '#E1F5EE', fg: '#085041' },
    { bg: '#FAECE7', fg: '#712B13' }
  ];
  return colors[sum % colors.length];
};

async function loadPosts() {
  try {
    const res = await fetch('/api/posts?status=approved');
    if (!res.ok) throw new Error('Không thể tải danh sách bài viết');
    const data = await res.json();
    
    posts = data.data.map(p => {
      const colors = p.company_name ? getInitialsColors(p.company_name) : { bg: '#E6F1FB', fg: '#0C447C' };
      return {
        id: p.id,
        memberId: p.member_id,
        company: p.company_name || 'Hội viên ẩn danh',
        initials: p.company_name ? p.company_name.split(' ').filter(Boolean).map(n => n[0]).join('').slice(0, 2).toUpperCase() : 'HV',
        bg: colors.bg,
        fg: colors.fg,
        title: p.title,
        summary: p.summary || '',
        body: p.body,
        type: p.type || 'Bài viết',
        contact: p.contact_info,
        tags: p.tags ? (typeof p.tags === 'string' ? JSON.parse(p.tags) : p.tags) : [],
        date: new Date(p.created_at).toLocaleDateString('vi-VN')
      };
    });
    render();
  } catch (err) {
    console.error(err);
    document.getElementById('posts-list').innerHTML = `<div class="empty" style="text-align:center;padding:2rem;color:var(--text-muted)"><i class="ti ti-alert-triangle" style="font-size:20px;display:block;margin-bottom:8px"></i> Lỗi tải dữ liệu bài viết.</div>`;
  }
}

function render() {
  const list = posts.filter(p => {
    if (searchQ && !p.title.toLowerCase().includes(searchQ) && !p.company.toLowerCase().includes(searchQ)) return false;
    return true;
  });

  const el = document.getElementById('posts-list');
  if (!list.length) {
    el.innerHTML = '<div class="empty" style="text-align:center;padding:3rem;color:var(--text-muted)"><i class="ti ti-news" style="font-size:24px;display:block;margin-bottom:8px"></i> Không tìm thấy bài viết nào phù hợp.</div>';
    return;
  }

  el.innerHTML = list.map(p => `
    <div class="card" style="margin-bottom:12px;border-color:var(--border)">
      <div style="padding:1.25rem">
        <div style="display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap">
          <div class="av-circle" style="background:${p.bg};color:${p.fg};flex-shrink:0;font-weight:500">${p.initials}</div>
          <div style="flex:1;min-width:240px">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap">
              <span style="font-size:12px;font-weight:500;color:var(--text-primary)">${p.company}</span>
              <span style="font-size:10px;color:var(--text-muted)">· ${p.type} · ${p.date}</span>
            </div>
            <div style="font-size:14px;font-weight:500;margin-bottom:6px;line-height:1.4;color:var(--text-primary)">${p.title}</div>
            <div style="font-size:12px;color:var(--text-secondary);line-height:1.6">${p.summary}</div>
            <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:8px">
              ${(p.tags || []).map(t => `<span style="background:var(--surface-1);border:0.5px solid var(--border);border-radius:99px;font-size:10px;padding:2px 7px;color:var(--text-secondary)">${t}</span>`).join('')}
            </div>
          </div>
          <div style="display:flex;align-items:center;flex-shrink:0;margin-left:auto">
            <button class="btn btn-ghost" style="font-size:12px;padding:6px 14px" onclick="viewPost(${p.id})"><i class="ti ti-eye"></i> Đọc bài</button>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function filterPosts(q) {
  searchQ = q.toLowerCase();
  render();
}

function viewPost(id) {
  const p = posts.find(x => x.id === id);
  if (!p) return;
  
  document.getElementById('modal-title').textContent = p.title;
  document.getElementById('modal-body').innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <div class="av-circle" style="background:${p.bg};color:${p.fg};font-weight:500">${p.initials}</div>
      <div>
        <div style="font-weight:500;font-size:13px">${p.company}</div>
        <div style="font-size:11px;color:var(--text-muted)">${p.date} · ${p.type}</div>
      </div>
    </div>
    <div style="font-size:15px;font-weight:500;margin-bottom:8px;color:var(--text-primary)">${p.title}</div>
    <div style="font-size:13px;color:var(--text-secondary);line-height:1.8;margin-bottom:12px;white-space:pre-line">${p.body}</div>
    ${p.contact ? `<div style="padding:10px 12px;background:var(--surface-1);border-radius:8px;font-size:12px;color:var(--text-secondary);border:0.5px solid var(--border)"><i class="ti ti-phone" style="font-size:13px;vertical-align:-2px"></i> Thông tin liên hệ: <strong>${p.contact}</strong></div>` : ''}
  `;
  document.getElementById('post-modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('post-modal').style.display = 'none';
}

document.addEventListener('DOMContentLoaded', loadPosts);
</script>
</body>
</html>
